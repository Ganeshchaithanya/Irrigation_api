name: aquasol_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  http: ^1.2.1
  glassmorphism: ^3.0.0
  card_swiper: ^3.0.1
  intl: ^0.19.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  flutter_animate: ^4.5.2
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/image.png"
  min_sdk_android: 21
